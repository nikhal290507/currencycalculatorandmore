<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account — CurrencyApp</title>
<link rel="stylesheet" href="style.css">
<style>
.auth-page {
  position: relative;
  min-height: calc(100vh - 70px);
  display: flex;
  flex-direction: column;
}
.auth-page::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url('https://images.unsplash.com/photo-1559526324-4b87b5e36e44?w=1600&auto=format&fit=crop&q=80') no-repeat center/cover;
  opacity: 0.08;
  z-index: 0;
}
.auth-wrapper {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 60px 20px;
}
.auth-card {
  display: flex;
  flex-direction: column;
  gap: 20px;
  background: rgba(13,26,45,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  padding: 40px;
  border-radius: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.85), 0 0 50px var(--gold-glow);
}

.auth-toggle-header {
  display: flex;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 8px;
}
.auth-tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s ease;
}
.auth-tab.active {
  background: rgba(201,168,76,0.15);
  color: var(--gold-light);
  box-shadow: inset 0 0 8px rgba(201,168,76,0.2);
}

.auth-form-container {
  display: none;
}
.auth-form-container.active {
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: fadeInForm 0.4s ease forwards;
}

@keyframes fadeInForm {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.auth-card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: var(--gold-light);
  text-align: center;
  margin-bottom: 4px;
}
.auth-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  margin-top: -12px;
  margin-bottom: 10px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}
.checkbox-row input {
  width: auto;
  margin: 0;
  cursor: pointer;
}

/* Custom error prompt warning badge block */
.auth-error-badge {
  display: none;
  background: rgba(248,113,113,0.1);
  border: 1px solid #f87171;
  color: #f87171;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  text-align: center;
  font-weight: 500;
}

/* ── UNIVERSAL FOOTER CONTACT INTEGRATION ── */
.footer-contact-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px 20px 20px;
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 50px;
  text-align: left;
}
.footer-info-col h3, .footer-form-col h3 {
  font-family: 'Playfair Display', serif;
  color: var(--gold-light);
  margin-bottom: 16px;
  font-size: 22px;
}
.footer-info-col p {
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 24px;
}
#footer-success-msg {
  display: none;
  text-align: center;
  color: var(--gold-light);
  font-size: 14px;
  margin-top: 6px;
  padding: 12px;
  background: rgba(201,168,76,0.07);
  border-radius: 10px;
  border: 1px solid var(--border);
}
@media (max-width: 768px) {
  .footer-contact-wrapper { grid-template-columns: 1fr; gap: 36px; padding: 30px 10px; }
}
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="logo-icon">💱</div>
    <h1>CurrencyApp</h1>
  </div>
  <nav>
  <a href="index.html">Home</a>
  <a href="converter.html">Converter</a>
  <a href="rates.html">Rates</a>
  <a href="travel.html">Travel Log</a>
  <a href="about.html">About</a>
  <a href="login.html" class="active" id="nav-auth-link">Account</a>
</nav>
</header>

<div class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card">
      
      <div class="auth-toggle-header">
        <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</div>
        <div class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Create Account</div>
      </div>

      <div class="auth-error-badge" id="authErrorMsg">You already have an account</div>

      <div class="auth-form-container active" id="form-login">
        <div>
          <h2>Welcome Back</h2>
          <p class="auth-subtitle">Access your security trading profile terminal</p>
        </div>
        <div class="form-group">
          <input type="email" id="loginEmail" placeholder="Email Address">
          <input type="password" id="loginPassword" placeholder="Password">
          <button type="button" onclick="handleAuthSubmit('login')">Secure Sign In ✦</button>
        </div>
      </div>

      <div class="auth-form-container" id="form-signup">
        <div>
          <h2>Join CurrencyApp</h2>
          <p class="auth-subtitle">Create a free premium account space portfolio</p>
        </div>
        <div class="form-group">
          <input type="text" id="signupName" placeholder="Full Name">
          <input type="email" id="signupEmail" placeholder="Email Address">
          <input type="password" id="signupPassword" placeholder="Choose Password">
          <button type="button" onclick="handleAuthSubmit('signup')">Register Portfolio ✦</button>
        </div>
      </div>

    </div>
  </div>
</div>
<script>
  // Check if user session already exists on page landing execution
if (localStorage.getItem('activeUser')) {
  window.location.href = 'profile.html';
}

function switchAuthTab(targetState) {
  document.getElementById('authErrorMsg').style.display = 'none';
  document.getElementById('tab-login').classList.remove('active');
  document.getElementById('tab-signup').classList.remove('active');
  document.getElementById('form-login').classList.remove('active');
  document.getElementById('form-signup').classList.remove('active');

  if (targetState === 'login') {
    document.getElementById('tab-login').classList.add('active');
    document.getElementById('form-login').classList.add('active');
  } else {
    document.getElementById('tab-signup').classList.add('active');
    document.getElementById('form-signup').classList.add('active');
  }
}

function handleAuthSubmit(mode) {
  const errorBadge = document.getElementById('authErrorMsg');
  errorBadge.style.display = 'none';

  // Load database arrays registry array mapping structure safely
  let userRegistry = JSON.parse(localStorage.getItem('userRegistry')) || [];

  if (mode === 'login') {
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const pass = document.getElementById('loginPassword').value.trim();
    
    if (!email || !pass) {
      showError("Please enter your credentials.");
      return;
    }

    // Cross-match credentials against local structures registry lines
    const matchedUser = userRegistry.find(u => u.email === email && u.password === pass);

    if (matchedUser) {
      localStorage.setItem('activeUser', JSON.stringify({ name: matchedUser.name, email: matchedUser.email }));
      window.location.href = "profile.html";
    } else {
      showError("Invalid email address or secure password profile match.");
    }

  } else {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim().toLowerCase();
    const pass = document.getElementById('signupPassword').value.trim();
    
    if (!name || !email || !pass) {
      showError("Please populate all text criteria fields.");
      return;
    }

    // CRITICAL CORE LOGIC: Inspect database entries duplicates values
    const accountExists = userRegistry.some(u => u.email === email);

    if (accountExists) {
      showError("You already have an account");
      return;
    }

    // Push profile record blocks entries safely
    const newUserRecord = { name: name, email: email, password: pass };
    userRegistry.push(newUserRecord);
    localStorage.setItem('userRegistry', JSON.stringify(userRegistry));

    // Sign them in automatically on account initialization structure loops
    localStorage.setItem('activeUser', JSON.stringify({ name: name, email: email }));
    window.location.href = "profile.html";
  }
}

function showError(text) {
  const badge = document.getElementById('authErrorMsg');
  badge.innerText = text;
  badge.style.display = 'block';
}

function optimizeTextArea(element) {
  // 1. Automatic height adjustment
  element.style.height = 'auto';
  element.style.height = element.scrollHeight + 'px';

  // 2. Strict 100-word limit control
  const maxWords = 100;
  const wordsArray = element.value.trim().split(/\s+/);
  
  if (wordsArray.length > maxWords && wordsArray[0] !== "") {
    element.value = wordsArray.slice(0, maxWords).join(" ");
    
    // Re-trigger height check following text truncation
    element.style.height = 'auto';
    element.style.height = element.scrollHeight + 'px';
  }
}
</script>
</body>
</html>
